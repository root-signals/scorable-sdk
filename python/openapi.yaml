          - $ref: '#/components/schemas/DatasetRangeRequest'
          nullable: true
          description: Specifies the range of dataset rows to use
        prompt:
          type: string
          minLength: 1
        reference_variables:
          type: array
          items:
            $ref: '#/components/schemas/ReferenceVariableRequest'
