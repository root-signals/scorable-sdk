components:
  schemas:
    Annotation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        dataset_item:
          type: string
          format: uuid
          nullable: true
        execution_log:
          type: string
          format: uuid
          nullable: true
        score_config:
          type: string
          format: uuid
        value:
          type: number
          format: double
          nullable: true
        category:
          type: string
          nullable: true
          maxLength: 255
        rationale:
          type: string
        status:
          $ref: '#/components/schemas/AnnotationStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - id
    AnnotationRequest:
      type: object
      properties:
        dataset_item:
          type: string
          format: uuid
          nullable: true
        execution_log:
          type: string
          format: uuid
          nullable: true
        score_config:
          type: string
          format: uuid
        value:
          type: number
          format: double
          nullable: true
        category:
          type: string
          nullable: true
          maxLength: 255
        rationale:
          type: string
        status:
          $ref: '#/components/schemas/AnnotationStatusEnum'
    AnnotationStatusEnum:
      enum:
      - draft
      - published
      type: string
      description: |-
        * `draft` - draft
        * `published` - published
    BatchExecutionStatus:
      enum:
      - pending
      - processing
      - completed
      - failed
      - partial
      type: string
      description: |-
        * `pending` - pending
        * `processing` - processing
        * `completed` - completed
        * `failed` - failed
        * `partial` - partial
    BatchSetTagsModelRequest:
      type: object
      properties:
        log_ids:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 500
          minItems: 1
        tags:
          type: array
          items:
            type: string
          default: []
          maxItems: 15
      required:
      - log_ids
    CalibrationRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        evaluator_external_id:
          type: string
          format: uuid
          readOnly: true
        evaluator_version_id:
          type: string
          format: uuid
          readOnly: true
        score_config:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        source_type:
          allOf:
          - $ref: '#/components/schemas/CalibrationSourceTypeEnum'
          readOnly: true
        dataset:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/CalibrationRunStatusEnum'
          readOnly: true
        metrics:
          readOnly: true
        n_examples:
          type: integer
          readOnly: true
        n_skipped:
          type: integer
          readOnly: true
        error:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - dataset
      - error
      - evaluator_external_id
      - evaluator_version_id
      - id
      - metrics
      - n_examples
      - n_skipped
      - score_config
      - source_type
      - status
    CalibrationRunCreateRequest:
      type: object
      properties:
        evaluator_external_id:
          type: string
          format: uuid
        evaluator_version_id:
          type: string
          format: uuid
          nullable: true
        score_config_id:
          type: string
          format: uuid
          nullable: true
        source:
          $ref: '#/components/schemas/CalibrationRunSourceRequest'
      required:
      - evaluator_external_id
      - source
    CalibrationRunItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        annotation:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        dataset_item:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        execution_log:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        evaluator_score:
          type: number
          format: double
          readOnly: true
          nullable: true
        human_value:
          type: number
          format: double
          readOnly: true
          nullable: true
        disagreement:
          type: number
          format: double
          readOnly: true
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/ExperimentStatusEnum'
          readOnly: true
        justification:
          type: string
          readOnly: true
        request:
          type: string
          readOnly: true
        response:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - annotation
      - created_at
      - dataset_item
      - disagreement
      - evaluator_score
      - execution_log
      - human_value
      - id
      - justification
      - request
      - response
      - status
    CalibrationRunSourceRequest:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CalibrationSourceTypeEnum'
        dataset_id:
          type: string
          format: uuid
          nullable: true
      required:
      - type
    CalibrationRunStatusEnum:
      enum:
      - pending
      - running
      - completed
      - failed
      type: string
      description: |-
        * `pending` - pending
        * `running` - running
        * `completed` - completed
        * `failed` - failed
    CalibrationSourceTypeEnum:
      enum:
      - dataset
      - logs
      type: string
      description: |-
        * `dataset` - dataset
        * `logs` - logs
    DataSetCreate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          nullable: true
        file:
          type: string
          format: uri
        type:
          $ref: '#/components/schemas/DataSetType'
        url:
          type: string
          format: uri
        tags:
          type: array
          items:
            type: string
            format: uuid
        owner:
          allOf:
          - $ref: '#/components/schemas/NestedUserDetails'
          readOnly: true
        has_header:
          type: boolean
          default: false
        project_id:
          type: string
          format: uuid
          nullable: true
          description: Project to associate this dataset with. Defaults to the organization's
            default project.
      required:
      - id
      - owner
    DataSetCreateRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
          minLength: 1
        file:
          type: string
          format: binary
        draft_id:
          type: string
          format: uuid
          writeOnly: true
        type:
          $ref: '#/components/schemas/DataSetType'
        url:
          type: string
          format: uri
          minLength: 1
        tags:
          type: array
          items:
            type: string
            format: uuid
        has_header:
          type: boolean
          default: false
        project_id:
          type: string
          format: uuid
          nullable: true
          description: Project to associate this dataset with. Defaults to the organization's
            default project.
    DataSetList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/DataSetType'
        tags:
          type: array
          items:
            type: string
            format: uuid
        owner:
          allOf:
          - $ref: '#/components/schemas/NestedUserDetails'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        project_id:
          type: string
          format: uuid
          nullable: true
          readOnly: true
        _meta:
          readOnly: true
          title: ' meta'
      required:
      - _meta
      - created_at
      - id
      - owner
      - project_id
    DataSetType:
      enum:
      - reference
      - test
      type: string
      description: |-
        * `reference` - REFERENCE
        * `test` - TEST
    DatasetItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        external_id:
          type: string
          format: uuid
          readOnly: true
        version_id:
          type: string
          format: uuid
          readOnly: true
        is_latest_version:
          type: boolean
          readOnly: true
          default: true
        response:
          type: string
        request:
          type: string
        expected_output:
          type: string
        contexts: {}
        variables: {}
        metadata: {}
        change_note:
          type: string
        is_archived:
          type: boolean
          readOnly: true
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/Annotation'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - annotations
      - created_at
      - external_id
      - id
      - is_archived
      - is_latest_version
      - response
      - version_id
    DatasetItemRequest:
      type: object
      properties:
        response:
          type: string
          minLength: 1
        request:
          type: string
        expected_output:
          type: string
        contexts: {}
        variables: {}
        metadata: {}
        change_note:
          type: string
      required:
      - response
    DatasetRangeRequest:
      type: object
      properties:
        start:
          type: integer
          minimum: 0
          nullable: true
        end:
          type: integer
          minimum: 0
          nullable: true
      required:
