  /v1/execution-logs/:
    get:
      operationId: execution_logs_list
      description: Get a list of execution logs. An execution log is created every
        time a skill or an evaluator is executed.
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: date_from
        schema:
          type: string
          format: date-time
        description: Filter logs created after or at this datetime (inclusive)
      - in: query
        name: date_to
        schema:
          type: string
          format: date-time
        description: Filter logs created before or at this datetime (inclusive)
      - in: query
        name: executed_item_id
        schema:
          type: string
          format: uuid
      - in: query
        name: execution_type
        schema:
          type: string
          enum:
          - evaluator
          - experiment
          - judge
          - proxy
          - skill
          - test
        description: |-
          * `skill` - skill
          * `evaluator` - evaluator
          * `judge` - judge
          * `experiment` - experiment
          * `test` - test
          * `proxy` - proxy
      - in: query
        name: has_session_id
        schema:
          type: boolean
        description: Filter logs that have a session identifier
      - in: query
        name: include
        schema:
          type: string
          default: ''
        description: 'Comma-separated list of additional fields to include in the
          response. Supports: llm_output, variables, evaluation_context'
      - in: query
        name: max_score
        schema:
          type: number
        description: Filter logs by maximum score, inclusive, excludes null scores
      - in: query
        name: min_score
        schema:
          type: number
        description: Filter logs by minimum score, inclusive, excludes null scores
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: project_id
        schema:
          type: string
          format: uuid
        description: Filter logs by project UUID
      - in: query
        name: search
        schema:
          type: string
          default: ''
        description: Filter with skill name or id
      - in: query
        name: session_id
        schema:
          type: string
        description: Filter logs by external session identifier (exact match)
      - in: query
        name: tags
        schema:
          type: string
          default: ''
        description: Filter logs by tag names (comma-separated)
      - in: query
        name: unique_skills
        schema:
          type: boolean
          default: false
        description: Return only unique skills
      - in: query
        name: user_id
        schema:
          type: string
        description: Filter logs by external user identifier (exact match)
      tags:
      - execution-logs
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedExecutionLogListList'
          description: ''
