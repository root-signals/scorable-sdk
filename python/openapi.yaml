      required:
      - evaluator_id
      - evaluator_name
      - justification
      - result
      - status
      - threshold
    SkillTestDataRequest:
      type: object
      properties:
        test_data:
          type: array
          items:
            type: array
            items:
              type: string
              minLength: 1
          writeOnly: true
          nullable: true
        test_dataset_id:
          type: string
          writeOnly: true
          minLength: 1
          description: 'Deprecated: superseded by the annotation-based dataset (DatasetItem
            + Annotation).'
        project_id:
          type: string
          format: uuid
          nullable: true
        dataset_range:
          allOf:
          - $ref: '#/components/schemas/DatasetRangeRequest'
          nullable: true
          description: Specifies the range of dataset rows to use
    SkillTestInputBehaviorEnum:
      enum:
      - fast
      - balanced
      - thorough
      type: string
      description: |-
        * `fast` - fast
        * `balanced` - balanced
        * `thorough` - thorough
    SkillTestInputRequest:
      type: object
      properties:
        test_data:
          type: array
          items:
            type: array
            items:
              type: string
              minLength: 1
          writeOnly: true
          nullable: true
        test_dataset_id:
          type: string
          writeOnly: true
          minLength: 1
          description: 'Deprecated: superseded by the annotation-based dataset (DatasetItem
            + Annotation).'
        project_id:
          type: string
          format: uuid
          nullable: true
        dataset_range:
          allOf:
          - $ref: '#/components/schemas/DatasetRangeRequest'
          nullable: true
          description: Specifies the range of dataset rows to use
        prompt:
          type: string
          minLength: 1
        reference_variables:
          type: array
          items:
            $ref: '#/components/schemas/ReferenceVariableRequest'
          default: []
        input_variables:
          type: array
          items:
            $ref: '#/components/schemas/InputVariableRequest'
          default: []
        models:
          type: array
          items:
            type: string
            minLength: 1
        name:
          type: string
          nullable: true
          minLength: 1
        objective:
          allOf:
          - $ref: '#/components/schemas/ObjectiveRequest'
          nullable: true
        is_evaluator:
          type: boolean
          default: false
        behavior:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/SkillTestInputBehaviorEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - prompt
    StatusEnum:
      enum:
      - public
      - public_unlisted
      - private
      type: string
      description: |-
        * `public` - public
        * `public_unlisted` - public_unlisted
        * `private` - private
    ValidationResultStatus:
      enum:
      - pending
      - finished
      type: string
      description: |-
        * `pending` - Pending
        * `finished` - Finished
    VisibilityEnum:
      type: string
      enum:
      - private
      - public
    _FileUploadRequestRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
      required:
      - file
    _FileUploadResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
      required:
      - id
  securitySchemes:
    publicApiKey:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Api-Key"
      x-default: Api-Key <your-api-key>
servers:
- url: https://api.localhost:8000
