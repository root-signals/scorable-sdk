        * `continuous` - continuous
        * `categorical` - categorical
    SkillExecutionValidatorResult:
      type: object
      properties:
        evaluator_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        evaluator_name:
          type: string
          readOnly: true
        result:
          type: number
          format: double
          readOnly: true
          nullable: true
        threshold:
          type: number
          format: double
          readOnly: true
        status:
