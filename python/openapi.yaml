          type: string
          format: uuid
        value:
          type: number
          format: double
          nullable: true
        category:
          type: string
          nullable: true
          maxLength: 255
        rationale:
          type: string
        status:
          $ref: '#/components/schemas/AnnotationStatusEnum'
    PatchedDatasetItemRequest:
      type: object
      properties:
        response:
          type: string
          minLength: 1
        request:
          type: string
        expected_output:
          type: string
        contexts: {}
        variables: {}
        metadata: {}
        change_note:
          type: string
    PatchedEvaluatorRequest:
      type: object
      properties:
        change_note:
          type: string
          nullable: true
        demonstration_dataset_id:
          type: string
          format: uuid
          nullable: true
          description: Dataset whose annotations for this evaluator are used as few-shot
            demonstrations.
        evaluator_demonstrations:
          type: array
          items:
            $ref: '#/components/schemas/EvaluatorDemonstrationsRequest'
          nullable: true
        input_variables:
          type: array
          items:
            $ref: '#/components/schemas/InputVariableRequest'
        models:
          type: array
          items:
            type: string
            minLength: 1
          description: Primary model (index 0) and an optional list of fallback models
            to use if the primary model is not available. If not provided, a default
            model will be used.
        name:
          type: string
          minLength: 2
          maxLength: 1000
        objective_id:
          type: string
          format: uuid
          writeOnly: true
        objective_version_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
          description: Optionally pin the Skill to a specific version of an Objective.
            If not provided, the latest version of the objective will be used and
            followed.
        overwrite:
          type: boolean
          writeOnly: true
          default: false
          description: Overwrite existing skill with the same name. Only for POST
            requests.
        project_id:
          type: string
          format: uuid
          nullable: true
          description: Project to assign this evaluator to. Defaults to org default
            project.
        scoring_criteria:
          type: string
          minLength: 1
          maxLength: 500000
        behavior:
          $ref: '#/components/schemas/EvaluatorBehaviorEnum'
    PatchedJudgeRequest:
      type: object
      properties:
        evaluator_references:
          type: array
          items:
            $ref: '#/components/schemas/EvaluatorReferenceRequest'
          writeOnly: true
        file_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
          description: ID of the JudgeFile to attach to this judge. Only one file
            per judge is supported. Set to null to remove the file.
        intent:
          type: string
          minLength: 1
          description: Intent for the judge
        name:
          type: string
          minLength: 3
          maxLength: 512
        project_id:
          type: string
          format: uuid
          nullable: true
          description: Project to assign this judge to. Defaults to org default project.
        stage:
          type: string
          maxLength: 255
        visibility:
          $ref: '#/components/schemas/VisibilityEnum'
    PatchedModelRequest:
      type: object
      properties:
        default_key:
          type: string
          writeOnly: true
          nullable: true
          minLength: 1
        max_output_token_count:
          type: integer
          minimum: 800
        max_token_count:
