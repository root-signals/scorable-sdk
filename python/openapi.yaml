openapi: 3.0.3
info:
  title: Scorable API
  version: 1.0.0 (latest)
  description: Scorable JSON API provides a way to access Scorable using provisioned
    API token
paths:
  /v1/annotations/:
    get:
      operationId: annotations_list
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: dataset
        schema:
          type: string
          format: uuid
        description: Filter by the dataset the items belong to.
      - in: query
        name: dataset_item
        schema:
          type: string
          format: uuid
        description: Filter by dataset item id.
      - in: query
        name: execution_log
        schema:
          type: string
          format: uuid
        description: Filter by execution log id.
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: score_config
        schema:
          type: string
          format: uuid
        description: Filter by score config id.
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status (draft or published).
      tags:
      - annotations
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAnnotationList'
          description: ''
    post:
      operationId: annotations_create
      description: Create an annotation.
      tags:
      - annotations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
      security:
      - publicApiKey: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
  /v1/annotations/{id}/:
    get:
      operationId: annotations_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - annotations
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
    put:
      operationId: annotations_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - annotations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnnotationRequest'
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
    patch:
      operationId: annotations_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - annotations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAnnotationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAnnotationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAnnotationRequest'
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
          description: ''
    delete:
      operationId: annotations_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - annotations
      security:
      - publicApiKey: []
      responses:
        '204':
          description: No response body
  /v1/calibration-runs/:
    get:
      operationId: calibration_runs_list
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: evaluator_external_id
        schema:
          type: string
        description: Filter by evaluator external id.
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - calibration-runs
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCalibrationRunList'
          description: ''
    post:
      operationId: calibration_runs_create
      description: Start a calibration run.
      tags:
      - calibration-runs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalibrationRunCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CalibrationRunCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CalibrationRunCreateRequest'
        required: true
      security:
      - publicApiKey: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalibrationRun'
          description: ''
  /v1/calibration-runs/{id}/:
    get:
      operationId: calibration_runs_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - calibration-runs
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalibrationRun'
          description: ''
  /v1/calibration-runs/{id}/items/:
    get:
      operationId: calibration_runs_items_list
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - calibration-runs
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCalibrationRunItemList'
          description: ''
  /v1/datasets/:
    get:
      operationId: datasets_list
      description: List datasets.
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: project_id
        schema:
          type: string
          format: uuid
        description: Filter by project UUID
      - in: query
        name: search
        schema:
          type: string
          default: ''
        description: Search for dataset by name
      - in: query
        name: type
        schema:
          type: string
          default: ''
        description: 'Filter by type. Possible values: reference, test'
      tags:
      - datasets
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDataSetListList'
          description: ''
    post:
      operationId: datasets_create
      description: Create a new dataset.
      tags:
      - datasets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataSetCreateRequest'
            examples:
              CreateADataSetFromURL:
                value:
                  name: My data set
                  url: https://example.com
                summary: Create a data set from URL
              CreateADataSetFromAFile:
                value: !!set
                  ? "\n                        const formData = new FormData();\n
                    \                       formData.append(\"file\", file);\n                        formData.append(\"type\",
                    \"reference\");\n                        const response = await
                    fetch(`base_url/dataset/upload/`, {\n                        method:
                    \"POST\",\n                        body: formData,\n                        headers:
                    {\n                            Authorization: `Api-Key ${api_key}`,\n
                    \                       },\n                        });\n                    "
                  : null
                summary: Create a data set from a file
                description: Use a form post to upload a file.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DataSetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DataSetCreateRequest'
      security:
      - publicApiKey: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSetCreate'
          description: ''
  /v1/datasets/{dataset_id}/items/:
    get:
      operationId: datasets_items_list
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: path
        name: dataset_id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: is_archived
        schema:
          type: boolean
        description: Include archived items when true (defaults to excluding them).
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - datasets
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDatasetItemList'
          description: ''
    post:
      operationId: datasets_items_create
      description: Create a dataset item.
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - datasets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DatasetItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DatasetItemRequest'
        required: true
      security:
      - publicApiKey: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetItem'
          description: ''
  /v1/datasets/{dataset_id}/items/{item_id}/:
    get:
      operationId: datasets_items_retrieve
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: item_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - datasets
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetItem'
          description: ''
    put:
      operationId: datasets_items_update
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: item_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - datasets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DatasetItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DatasetItemRequest'
        required: true
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetItem'
          description: ''
    patch:
      operationId: datasets_items_partial_update
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: item_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - datasets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDatasetItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDatasetItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDatasetItemRequest'
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetItem'
          description: ''
    delete:
      operationId: datasets_items_destroy
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: item_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - datasets
      security:
      - publicApiKey: []
      responses:
        '204':
          description: No response body
  /v1/datasets/{dataset_id}/items/bulk/:
    post:
      operationId: datasets_items_bulk_create
      description: Bulk create dataset items.
      parameters:
      - in: path
        name: dataset_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - datasets
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DatasetItemRequest'
          application/x-www-form-urlencoded:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DatasetItemRequest'
          multipart/form-data:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DatasetItemRequest'
        required: true
      security:
      - publicApiKey: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatasetItem'
          description: ''
  /v1/datasets/{id}/:
    get:
      operationId: datasets_retrieve
      description: Get dataset details or download the dataset file.
      parameters:
      - in: query
        name: download
        schema:
          type: boolean
          default: false
        description: Download the dataset.
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - datasets
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSetList'
          description: ''
    delete:
      operationId: datasets_destroy
      description: Delete a dataset.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - datasets
      security:
      - publicApiKey: []
      responses:
        '204':
          description: No response body
  /v1/evaluators/:
    get:
      operationId: evaluators_list
      description: List all evaluators. The response includes a 'requirements' field
        for each evaluator that specifies what parameters are required for execution.
        The requirements field indicates whether the evaluator requires request, response,
        contexts, expected_output, or reference variables.
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: include_public
        schema:
          type: boolean
          default: false
        description: Include public evaluators from other organizations.
      - in: query
        name: is_root_evaluator
        schema:
          type: boolean
          default: false
        description: Return only Scorable defined evaluators.
      - in: query
        name: name
        schema:
          type: string
          default: ''
        description: Search for evaluators by name (exact match).
      - in: query
        name: objective__intent
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: owner__email
        schema:
          type: string
      - in: query
        name: owner__first_name
        schema:
          type: string
      - in: query
        name: owner__last_name
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: project_id
        schema:
          type: string
          format: uuid
        description: Filter by project. Public evaluators are excluded when this filter
          is set.
      - in: query
        name: search
        schema:
          type: string
          default: ''
        description: Search for evaluators by name or description.
      - in: query
        name: skill_type
        schema:
          type: string
          enum:
          - managed
          - native
        description: |-
          * `managed` - managed
          * `native` - native
      tags:
      - evaluators
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvaluatorListOutputList'
          description: List of evaluators with their requirements
    post:
      operationId: evaluators_create
      description: Create a new evaluator.
      tags:
      - evaluators
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluatorRequest'
            examples:
              CreateAnEvaluator:
                value:
                  scoring_criteria: Does the {{response}} contain ambiguous language?
                  name: Direct language
                  objective:
                    intent: Does the response contain ambiguous language?
                  models:
                  - gpt-4-turbo
                summary: Create an Evaluator
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EvaluatorRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EvaluatorRequest'
        required: true
      security:
      - publicApiKey: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evaluator'
          description: ''
  /v1/evaluators/{id}/:
    get:
      operationId: evaluators_retrieve
      description: Get evaluator details. The response includes a 'inputs' field that
        specifies what parameters are required for execution. The requirements field
        indicates whether the evaluator requires request, response, contexts, expected_output,
        or reference variables.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: query
        name: version_id
        schema:
          type: string
          default: ''
        description: Get a specific version of the evaluator
      tags:
      - evaluators
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evaluator'
          description: Evaluator details with requirements information
    put:
      operationId: evaluators_update
      description: Update an evaluator.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - evaluators
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluatorRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EvaluatorRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EvaluatorRequest'
        required: true
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evaluator'
          description: ''
    patch:
      operationId: evaluators_partial_update
      description: Update an evaluator. All fields are optional.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - evaluators
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEvaluatorRequest'
            examples:
              UpdateASkillPrompt:
                value:
                  prompt: 'Please answer this {{question}}. Your answer here:'
                  input_variables:
                  - name: question
                summary: Update a skill prompt
              UpdateAnEvaluatorScoringCriteria:
                value:
                  scoring_criteria: Does the {{response}} contain ambiguous language?
                    Explain your reasoning.
                  input_variables:
                  - name: response
                summary: Update an evaluator scoring criteria
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEvaluatorRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEvaluatorRequest'
      security:
      - publicApiKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evaluator'
          description: ''
    delete:
      operationId: evaluators_destroy
      description: Delete an evaluator.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - evaluators
      security:
      - publicApiKey: []
      responses:
        '204':
          description: No response body
  /v1/evaluators/calibrate/:
    post:
      operationId: evaluators_calibrate_create
      description: Test an evaluator definition using calibration data
      tags:
      - evaluators
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillTestInputRequest'
            examples:
              TestWithCalibrationData.:
                value:
                  test_data:
                  - - '1.0'
                    - '2'
                    - What is 1+1. Respond with a single digit number.
                  - - '0.34'
                    - The primary colors are red, blue, and green.
                    - What are the primary colors?
                  objective:
                    intent: 'Is the output relevant to the prompt? Evaluate for the
                      following criteria: accuracy, completeness, adherence to the
                      prompt, and logical consistency.'
                  prompt: Evaluate how well the {{response}} adheres to instructions
                    given in {{request}}.
                  name: Relevancy
                  models:
                  - gpt-4-turbo
                  is_evaluator: true
                summary: Test with calibration data.
                description: 'Calibration test_data must have columns in this order:
                  ''expected score'', ''text to evaluate (output)'', ''input''. Input
                  is optional.'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SkillTestInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SkillTestInputRequest'
        required: true
      security:
      - publicApiKey: []
      deprecated: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvaluatorCalibrationOutput'
          description: ''
  /v1/evaluators/calibrate/{id}:
    post:
      operationId: evaluators_calibrate_create_2
      description: Test an existing evaluator using calibration data
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - evaluators
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillTestDataRequest'
            examples:
              TestWithCalibrationData.:
                value:
                  test_data:
                  - - '1.0'
                    - '2'
                    - What is 1+1. Respond with a single digit number.
                  - - '0.34'
                    - The primary colors are red, blue, and green.
                    - What are the primary colors?
                summary: Test with calibration data.
                description: 'Calibration test_data must have columns in this order:
                  ''expected score'', ''text to evaluate (output)'', ''input''. Input
                  is optional.'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SkillTestDataRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SkillTestDataRequest'
      security:
      - publicApiKey: []
      deprecated: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvaluatorCalibrationOutput'
          description: ''
  /v1/evaluators/duplicate/{id}/:
    post:
      operationId: evaluators_duplicate_create
      description: Duplicate an evaluator
      parameters:
      - in: path
        name: id
