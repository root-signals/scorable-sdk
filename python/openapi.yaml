      - user_behavior
      type: string
      description: |-
        * `agent_behavior` - agent_behavior
        * `user_behavior` - user_behavior
    ValidationResultStatus:
      enum:
      - pending
      - finished
      type: string
      description: |-
        * `pending` - Pending
        * `finished` - Finished
    VisibilityEf8Enum:
      type: string
      enum:
      - private
      - public
