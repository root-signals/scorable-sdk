components:
  schemas:
    BatchExecutionStatus:
      enum:
      - pending
      - processing
      - completed
      - failed
      - partial
      type: string
      description: |-
        * `pending` - pending
        * `processing` - processing
        * `completed` - completed
        * `failed` - failed
        * `partial` - partial
    DataSetCreate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          nullable: true
        file:
          type: string
          format: uri
        type:
          $ref: '#/components/schemas/DataSetType'
        url:
          type: string
          format: uri
        tags:
          type: array
          items:
            type: string
            format: uuid
        owner:
          allOf:
          - $ref: '#/components/schemas/NestedUserDetails'
          readOnly: true
        has_header:
          type: boolean
          default: false
      required:
      - id
      - owner
    DataSetCreateRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
          minLength: 1
        file:
          type: string
          format: binary
        draft_id:
          type: string
          format: uuid
          writeOnly: true
        type:
          $ref: '#/components/schemas/DataSetType'
        url:
          type: string
          format: uri
          minLength: 1
        tags:
          type: array
          items:
            type: string
            format: uuid
        has_header:
          type: boolean
          default: false
    DataSetList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/DataSetType'
        tags:
          type: array
          items:
            type: string
            format: uuid
        owner:
          allOf:
          - $ref: '#/components/schemas/NestedUserDetails'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        _meta:
          readOnly: true
          title: ' meta'
      required:
      - _meta
      - created_at
      - id
      - owner
    DataSetType:
      enum:
      - reference
      - test
      type: string
      description: |-
        * `reference` - REFERENCE
        * `test` - TEST
    DatasetRangeRequest:
      type: object
      properties:
        start:
          type: integer
          minimum: 0
          nullable: true
        end:
          type: integer
          minimum: 0
          nullable: true
      required:
      - end
      - start
    Evaluator:
      type: object
      properties:
        change_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        evaluator_demonstrations:
          type: array
          items:
            $ref: '#/components/schemas/EvaluatorDemonstrations'
          nullable: true
        id:
          type: string
          format: uuid
          readOnly: true
        input_variables:
          type: array
          items:
            $ref: '#/components/schemas/InputVariable'
        models:
          type: array
          items:
            type: string
          description: Primary model (index 0) and an optional list of fallback models
            to use if the primary model is not available. If not provided, a default
            model will be used.
        name:
          type: string
          maxLength: 1000
          minLength: 2
        objective:
          allOf:
          - $ref: '#/components/schemas/Objective'
          readOnly: true
          nullable: true
        owner:
          allOf:
          - $ref: '#/components/schemas/NestedUserDetails'
          readOnly: true
        prompt:
          type: string
          maxLength: 500000
        visibility:
          allOf:
          - $ref: '#/components/schemas/VisibilityEf8Enum'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_by:
          allOf:
          - $ref: '#/components/schemas/NestedUserDetails'
          readOnly: true
          nullable: true
        version_id:
          type: string
          format: uuid
          readOnly: true
        _meta:
          readOnly: true
          title: ' meta'
        inputs:
          type: object
          description: Schema defining the input parameters required for execution.
            The schema consists of variables defined in the prompt template (predicate)
            and special variables like contexts and expected output.
          additionalProperties:
            type: object
            required:
            - type
            properties:
              type:
                type: string
                enum:
                - string
                - array
              items:
                type: object
                required:
                - type
                properties:
                  type:
                    type: string
                    enum:
                    - string
                    - object
          example:
            response:
              type: string
            contexts:
              type: array
              items:
                type: string
            my_custom_variable:
              type: string
          readOnly: true
      required:
      - _meta
      - created_at
      - id
      - inputs
      - name
      - objective
      - owner
      - prompt
      - updated_at
      - updated_by
      - version_id
      - visibility
    EvaluatorCalibrationOutput:
