              examples:
                ExecuteAMulti-turnEvaluator:
                  value:
                    tools:
                    - type: function
                      function:
                        name: order_lookup
                        description: Look up an order by ID
                        parameters:
                          type: object
                          properties:
                            order_id:
                              type: string
                    turns:
                    - role: user
                      content: Hello, I need help with my order
                    - role: assistant
                      content: I'd be happy to help! What's your order number?
