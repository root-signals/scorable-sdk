          nullable: true
          minLength: 1
        objective:
          allOf:
          - $ref: '#/components/schemas/ObjectiveRequest'
          nullable: true
        is_evaluator:
          type: boolean
          default: false
      required:
      - prompt
    StatusEnum:
      enum:
      - unlisted
      - listed
      - public
      - public_unlisted
      - private
      type: string
      description: |-
        * `unlisted` - unlisted
        * `listed` - listed
        * `public` - public
        * `public_unlisted` - public_unlisted
        * `private` - private
    TargetEnum:
      enum:
